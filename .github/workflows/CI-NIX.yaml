name: Nix CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  nix:
    runs-on: ubuntu-latest

    steps:
      ############################################
      # Checkout
      ############################################
      - name: Checkout repository
        uses: actions/checkout@v4

      ############################################
      # Install Nix (with flakes enabled)
      ############################################
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      ############################################
      # Flake sanity (cheap & fast)
      ############################################
      - name: Flake metadata
        run: nix flake metadata

      - name: Flake show
        run: nix flake show

      ############################################
      # Formatter & Lint
      #
      # Fonte da verdade:
      # - formatter.${system}
      # - checks.${system}
      ############################################
      - name: Run flake checks (fmt + lint)
        run: nix flake check

      ############################################
      # Evaluate NixOS hosts (no build, no VM)
      ############################################
      - name: Evaluate CI host (headless)
        run: |
          nix eval .#nixosConfigurations.ci.config.system.build.toplevel --raw

      - name: Evaluate Desktop hosts
        run: |
          nix eval .#nixosConfigurations.dell.config.system.build.toplevel --raw
          nix eval .#nixosConfigurations.macbook.config.system.build.toplevel --raw
